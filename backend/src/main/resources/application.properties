# ===================================
# Food Delivery Application - Config
# ===================================

# Server Port
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/moha
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Secret key for signing JWT tokens (use a strong key in production)
jwt.secret=fooddeliveryappsecretkey2024verylong256bitsecretkeyforsecurity
jwt.expiration=86400000

# Allow CORS for React frontend
spring.web.cors.allowed-origins=http://localhost:5173
