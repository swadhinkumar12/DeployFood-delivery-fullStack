# ===================================
# Food Delivery Application - Config (Development)
# ===================================

# Active Profile (use -Dspring.profiles.active=prod for production)


# Server Port
server.port=${JAVA_PORT:8080}

# MySQL Database Configuration (defaults for local development)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:food_delivery_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (change in production!)
jwt.secret=${JWT_SECRET:fooddeliveryappsecretkey2024verylong256bitsecretkeyforsecurity}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Allow CORS for React frontend (development)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Mobile notifications (free defaults)
# provider=log means simulation only (no real SMS)
notification.mobile.provider=${NOTIFICATION_MOBILE_PROVIDER:log}
notification.mobile.textbelt.url=${NOTIFICATION_TEXTBELT_URL:https://textbelt.com/text}
notification.mobile.textbelt.key=${NOTIFICATION_TEXTBELT_KEY:textbelt}

# Email notifications (free with SMTP provider/account)
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:true}
notification.email.from=${NOTIFICATION_EMAIL_FROM:noreply@bytesoul.app}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
