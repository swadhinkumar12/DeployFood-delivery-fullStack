# ===================================
# Food Delivery Application - Config (Development)
# ===================================

# Active Profile (use -Dspring.profiles.active=prod for production)
spring.profiles.active=dev

# Server Port
server.port=${JAVA_PORT:8080}

# MySQL Database Configuration (defaults for local development)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:food_delivery_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (change in production!)
jwt.secret=${JWT_SECRET:fooddeliveryappsecretkey2024verylong256bitsecretkeyforsecurity}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Allow CORS for React frontend (development)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
