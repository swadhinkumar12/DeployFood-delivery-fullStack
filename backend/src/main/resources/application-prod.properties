# ===================================
# Production Profile - application-prod.properties
# Use environment variables (no hardcoding secrets!)
# ===================================

# Server Port
server.port=${JAVA_PORT:8080}

# MySQL Database Configuration (from environment)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (from environment)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration (from environment - comma-separated origins)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging (production-appropriate)
logging.level.root=INFO
logging.level.com.fooddelivery=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Connection Pool (production optimization)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=30000

# Error handling
server.error.include-message=always
server.error.include-stacktrace=never

# Mobile notifications (free defaults)
# provider=log means simulation only (no real SMS)
notification.mobile.provider=${NOTIFICATION_MOBILE_PROVIDER:log}
notification.mobile.textbelt.url=${NOTIFICATION_TEXTBELT_URL:https://textbelt.com/text}
notification.mobile.textbelt.key=${NOTIFICATION_TEXTBELT_KEY:textbelt}

# Email notifications (free with SMTP provider/account)
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:true}
notification.email.from=${NOTIFICATION_EMAIL_FROM:noreply@bytesoul.app}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
